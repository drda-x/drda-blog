name: Deploy Hexo to GitHub Pages

于:
  push:
    分支:
      - main          # 每次 push 到 main 触发

permissions:
  contents: write     # 需要写入权限来推送 gh-pages 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false          # 如果主题是 git submodule 必须加
          fetch-depth: 0

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Hexo
      - name: Build
        run: npx hexo generate

      # 5. 部署到 gh-pages 分支
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public       # Hexo 生成的静态文件目录
          publish_branch: gh-pages
