name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure Git for hexo deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Use GITHUB_TOKEN for any https://github.com/ push performed by hexo-deployer-git
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Deploy with Hexo
        run: pnpm deploy
        env:
          CI: false
name: Deploy Hexo to GitHub Pages

于:
  push:
    分支:
      - main          # 每次 push 到 main 触发

permissions:
  contents: write     # 需要写入权限来推送 gh-pages 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true          # 如果主题是 git submodule 必须加
          fetch-depth: 0

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Hexo
      - name: Build
        run: npx hexo generate

      # 5. 部署到 gh-pages 分支
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public       # Hexo 生成的静态文件目录
          publish_branch: gh-pages
