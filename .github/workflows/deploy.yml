name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure Git for hexo deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global advice.detachedHead false
          # Set origin to use the injected token for non-interactive push
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Inject token into Hexo deploy config
        run: |
          DEPLOY_REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          echo "Replacing deploy.repo with tokenized URL"
          # use POSIX character class for whitespace to be portable in GNU sed
          sed -E -i "s#^([[:space:]]*)repo:.*#\1repo: \"${DEPLOY_REPO}\"#" _config.yml
          echo "---_config.yml after replace---"
          sed -n '1,200p' _config.yml
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Deploy with Hexo
        run: |
          pnpm hexo clean
          pnpm hexo deploy
        env:
          CI: false
          GIT_TERMINAL_PROMPT: 0

